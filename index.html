<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ثانية ثانوي الرسمية | كاملة</title>
    
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-XCYY1H22CQ"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-XCYY1H22CQ');
    </script>

    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: { tajawal: ['Tajawal', 'sans-serif'] },
                    colors: { brand: { 50: '#eff6ff', 500: '#3b82f6', 600: '#2563eb', 900: '#1e3a8a' }, gold: '#ca8a04' }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Tajawal', sans-serif; transition: background 0.3s; }
        .glass-header { backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); background: rgba(255,255,255,0.8); }
        .dark .glass-header { background: rgba(15, 23, 42, 0.8); border-bottom-color: #334155; }
        .premium-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); }
        .dark .premium-card { background: #1e293b; border-color: rgba(255,255,255,0.05); }
        .book-cover { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); position: relative; }
        .fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100">

    <header class="fixed w-full top-0 z-50 glass-header border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 py-3 flex justify-between items-center">
            <div class="flex items-center gap-3 cursor-pointer" onclick="switchSection('home')">
                <img src="https://i.ibb.co/dyLKg9t/file-0000000019687243878a13e9b38ee2f9.png" class="w-10 h-10 rounded-lg shadow-sm">
                <div>
                    <h1 class="text-lg font-black leading-none">منصة ثانية ثانوي</h1>
                    <span class="text-[10px] text-gold font-bold">النسخة الرسمية الشاملة</span>
                </div>
            </div>
            <button onclick="toggleTheme()" class="p-2 rounded-full bg-slate-100 dark:bg-slate-800">
                <i data-lucide="sun" class="dark:block hidden text-yellow-400"></i>
                <i data-lucide="moon" class="dark:hidden block text-slate-600"></i>
            </button>
        </div>
    </header>

    <div class="h-20"></div>

    <main class="max-w-7xl mx-auto px-4 py-6">
        
        <section id="section-home" class="fade-in space-y-10">
            <div class="text-center py-12 space-y-6">
                <h2 class="text-4xl md:text-6xl font-black leading-tight">كل كتبك ومصادرك <br><span class="text-brand-600">في جيبك مجاناً</span></h2>
                <p class="text-slate-500 max-w-xl mx-auto font-medium">جمعنا لك أكتر من 50 مصدر تعليمي (كتب وزارة، كتب خارجية، ملازم مدرسين) عشان ما تدورش كتير.</p>
                <div class="flex flex-wrap justify-center gap-4">
                    <button onclick="switchSection('books')" class="px-8 py-4 bg-brand-600 text-white rounded-2xl font-bold shadow-lg shadow-brand-500/30">📚 تصفح الكتب والملفات</button>
                    <button onclick="switchSection('teachers')" class="px-8 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl font-bold">🎥 شروحات اليوتيوب</button>
                </div>
            </div>

            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div onclick="switchSection('about')" class="premium-card p-6 rounded-3xl bg-white text-center cursor-pointer hover:scale-105">
                    <i data-lucide="help-circle" class="mx-auto mb-2 text-blue-500"></i>
                    <span class="font-bold">عن المنصة</span>
                </div>
                <div onclick="window.open('https://t.me/sanaye20011')" class="premium-card p-6 rounded-3xl bg-white text-center cursor-pointer hover:scale-105">
                    <i data-lucide="send" class="mx-auto mb-2 text-sky-500"></i>
                    <span class="font-bold">قناة التليجرام</span>
                </div>
                <div onclick="switchSection('policy')" class="premium-card p-6 rounded-3xl bg-white text-center cursor-pointer hover:scale-105">
                    <i data-lucide="shield-check" class="mx-auto mb-2 text-green-500"></i>
                    <span class="font-bold">حقوق الملكية</span>
                </div>
                <div onclick="window.open('https://t.me/llTwasell')" class="premium-card p-6 rounded-3xl bg-white text-center cursor-pointer hover:scale-105">
                    <i data-lucide="headset" class="mx-auto mb-2 text-amber-500"></i>
                    <span class="font-bold">الدعم الفني</span>
                </div>
            </div>
        </section>

        <section id="section-books" class="hidden fade-in space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">مكتبة الكتب والملفات</h2>
                <button onclick="switchSection('home')" class="text-sm font-bold text-brand-600">رجوع</button>
            </div>
            
            <div class="flex gap-2 overflow-x-auto pb-2" id="book-tabs">
                <button onclick="renderBooks('ministry', this)" class="tab-btn px-5 py-2 rounded-full bg-brand-600 text-white whitespace-nowrap font-bold">كتب الوزارة</button>
                <button onclick="renderBooks('external', this)" class="tab-btn px-5 py-2 rounded-full bg-slate-200 dark:bg-slate-800 whitespace-nowrap font-bold">كتب خارجية</button>
                <button onclick="renderBooks('teachers', this)" class="tab-btn px-5 py-2 rounded-full bg-slate-200 dark:bg-slate-800 whitespace-nowrap font-bold">مذكرات مدرسين</button>
            </div>

            <div id="books-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
                </div>
        </section>

        <section id="section-teachers" class="hidden fade-in space-y-6">
            <div class="flex justify-between items-center">
                <h2 class="text-2xl font-black">أفضل مدرسي اليوتيوب</h2>
                <button onclick="switchSection('home')" class="text-sm font-bold text-brand-600">رجوع</button>
            </div>
            <div id="teachers-container" class="grid gap-4">
                </div>
        </section>

    </main>

    <script>
        // داتا الكتب كاملة كما طلبت
        const allBooks = [
            // كتب الوزارة
            { title: 'علم نفس - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/930' },
            { title: 'تاريخ - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/931' },
            { title: 'فيزياء - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/932' },
            { title: 'إنجليزي - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/934' },
            { title: 'رياضة بحتة - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/935' },
            { title: 'تطبيقية - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/937' },
            { title: 'رياضة عامة (أدبي) - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/938' },
            { title: 'لغة عربية - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/939' },
            { title: 'كيمياء - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/941' },
            { title: 'تربية وطنية - وزارة', cat: 'ministry', url: 'https://t.me/sanaye20011/942' },
            // خارجية
            { title: 'كتاب الامتحان - فيزياء', cat: 'external', url: 'https://t.me/sanaye20011/829' },
            { title: 'كتاب المعاصر - بحتة', cat: 'external', url: 'https://t.me/sanaye20011/846' },
            { title: 'كتاب المعاصر - إنجليزي', cat: 'external', url: 'https://t.me/sanaye20011/1078' },
            { title: 'كتاب كيان - عربي شرح', cat: 'external', url: 'https://t.me/sanaye20011/1156' },
            { title: 'ملحق كيان - عربي', cat: 'external', url: 'https://t.me/sanaye20011/1093' },
            { title: 'العمالقة - إنجليزي', cat: 'external', url: 'https://t.me/sanaye20011/1174' },
            { title: 'كتاب الامتحان - كيمياء', cat: 'external', url: 'https://t.me/sanaye20011/1241' },
            // مدرسين
            { title: 'مذكرة أحمد عصام - رياضة', cat: 'teachers', url: 'https://t.me/sanaye20011/1032' },
            { title: 'مذكرة عبد المعبود - فيزياء', cat: 'teachers', url: 'https://t.me/sanaye20011/1066' },
            { title: 'كيمياء كاملة - خالد صقر', cat: 'teachers', url: 'https://t.me/sanaye20011/1194' },
            { title: 'عربي كامل - محمد صلاح', cat: 'teachers', url: 'https://t.me/sanaye20011/1300' },
            { title: 'مذكرة محمد عبد الجواد - كيمياء', cat: 'teachers', url: 'https://t.me/sanaye20011/1274' }
        ];

        const teachersData = [
            { name: 'أ/ محمد صلاح', sub: 'اللغة العربية', link: 'https://youtube.com/@mohamedsalah' },
            { name: 'أ/ خالد صقر', sub: 'الكيمياء', link: '#' },
            { name: 'أ/ محمد عبد المعبود', sub: 'الفيزياء', link: '#' },
            { name: 'أ/ أحمد عصام', sub: 'الرياضيات', link: '#' }
        ];

        function switchSection(id) {
            ['home', 'books', 'teachers'].forEach(s => document.getElementById('section-'+s).classList.add('hidden'));
            document.getElementById('section-'+id).classList.remove('hidden');
            if(id === 'books') renderBooks('ministry');
            if(id === 'teachers') renderTeachers();
            window.scrollTo(0,0);
        }

        function renderBooks(category, btn) {
            // تحديث شكل الزراير
            if(btn) {
                document.querySelectorAll('.tab-btn').forEach(b => b.className = 'tab-btn px-5 py-2 rounded-full bg-slate-200 dark:bg-slate-800 whitespace-nowrap font-bold');
                btn.className = 'tab-btn px-5 py-2 rounded-full bg-brand-600 text-white whitespace-nowrap font-bold';
            }

            const grid = document.getElementById('books-grid');
            const filtered = allBooks.filter(b => b.cat === category);
            
            grid.innerHTML = filtered.map(book => `
                <div class="premium-card bg-white dark:bg-slate-900 rounded-2xl overflow-hidden shadow-sm flex flex-col">
                    <div class="book-cover h-24 flex items-center justify-center p-4 text-center">
                        <span class="text-white font-black text-sm drop-shadow-md">${book.title}</span>
                    </div>
                    <div class="p-3">
                        <a href="${book.url}" target="_blank" class="block w-full text-center py-2 bg-slate-100 dark:bg-slate-800 rounded-xl text-xs font-bold hover:bg-brand-600 hover:text-white transition-all">فتح الرابط (Telegram)</a>
                    </div>
                </div>
            `).join('');
        }

        function renderTeachers() {
            const container = document.getElementById('teachers-container');
            container.innerHTML = teachersData.map(t => `
                <div class="p-4 bg-white dark:bg-slate-900 rounded-2xl flex justify-between items-center border border-slate-100 dark:border-slate-800">
                    <div>
                        <h4 class="font-black text-brand-600">${t.name}</h4>
                        <p class="text-xs font-bold text-slate-400">${t.sub}</p>
                    </div>
                    <a href="${t.link}" target="_blank" class="p-3 bg-red-50 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition-all">
                        <i data-lucide="youtube" class="w-5 h-5"></i>
                    </a>
                </div>
            `).join('');
            lucide.createIcons();
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        // تشغيل أيقونات
        lucide.createIcons();
    </script>
</body>
</html>
