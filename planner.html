<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Battle Plan | منصة ثانية ثانوي الرسمية</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { 
            --primary: #00d2ff; 
            --secondary: #3a7bd5;
            --bg: #05070a; 
            --card: #0f172a; 
            --accent: #f43f5e;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background: var(--bg); 
            color: #fff; 
            margin: 0; 
            padding: 10px;
            background-image: radial-gradient(circle at 50% 50%, #111827 0%, #05070a 100%);
        }

        .container { 
            max-width: 700px; 
            margin: 20px auto; 
            background: var(--card); 
            border-radius: 30px; 
            padding: 30px; 
            border: 1px solid rgba(0, 210, 255, 0.3); 
            box-shadow: 0 20px 60px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        /* Logo Branding */
        .brand-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .brand-name {
            font-weight: 900;
            font-size: 1.8rem;
            background: linear-gradient(to right, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }
        .brand-tagline {
            font-size: 0.8rem;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .box { 
            background: rgba(30, 41, 59, 0.5); 
            padding: 20px; 
            border-radius: 20px; 
            margin-bottom: 20px; 
            border: 1px solid rgba(255,255,255,0.05); 
        }

        label { display: block; margin-bottom: 10px; font-weight: 700; color: var(--primary); font-size: 0.95rem; }

        input, select { 
            width: 100%; padding: 14px; border-radius: 12px; 
            border: 1px solid #334155; background: #020617; 
            color: #fff; font-family: 'Cairo'; font-size: 1rem; outline: none; transition: 0.3s;
        }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(0,210,255,0.2); }

        .btn-plus { background: #1e40af; color: #fff; border: none; padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; margin-top: 10px; font-size: 0.8rem; }

        .btn-main { 
            width: 100%; padding: 20px; background: linear-gradient(45deg, var(--secondary), var(--primary)); 
            color: #fff; border: none; border-radius: 20px; font-weight: 900; font-size: 1.2rem; 
            cursor: pointer; transition: 0.4s; margin-top: 10px;
        }
        .btn-main:hover { transform: scale(1.02); box-shadow: 0 10px 30px rgba(0, 210, 255, 0.4); }

        /* Result Styles */
        .task { 
            background: rgba(15, 23, 42, 0.8); 
            border-right: 5px solid var(--primary); 
            padding: 20px; margin: 15px 0; border-radius: 15px; 
            position: relative;
        }
        .task h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #f8fafc; }
        .task p { margin: 0; font-size: 0.85rem; color: #94a3b8; line-height: 1.6; }
        .time-badge { 
            position: absolute; left: 20px; top: 20px; 
            background: rgba(0, 210, 255, 0.1); color: var(--primary); 
            padding: 4px 12px; border-radius: 20px; font-size: 0.8rem; font-weight: 900;
        }

        .actions-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 25px; }
        .btn-sub { padding: 15px; border-radius: 15px; border: none; color: #fff; font-weight: bold; cursor: pointer; font-family: 'Cairo'; transition: 0.3s; }
        .btn-whatsapp { background: #25d366; }
        .btn-pdf { background: #ef4444; }
        .btn-img { background: #6366f1; }

        .footer-logo { text-align: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.05); }
        .footer-logo p { font-size: 0.7rem; color: #475569; margin: 2px; }

        .hidden { display: none; }
        @media (max-width: 500px) { .actions-grid { grid-template-columns: 1fr; } .time-badge { position: relative; left: 0; top: 0; display: inline-block; margin-bottom: 10px; } }
    </style>
</head>
<body>

<div class="container" id="input-page">
    <div class="brand-header">
        <div class="brand-name">منصة ثانية ثانوي</div>
        <div class="brand-tagline">النظام الرسمي لتوليد الجداول الذكية</div>
    </div>
    
    <div class="box">
        <label>👤 اسم البطل (أو اللقب):</label>
        <input type="text" id="user_name" placeholder="مثلاً: دكتور أحمد المستقبلي">
    </div>

    <div class="box">
        <label>🎯 حلمك إيه؟ (هدف اليوم):</label>
        <input type="text" id="user_goal" placeholder="مثلاً: تقفيل امتحان الفيزياء / دخول هندسة">
    </div>

    <div class="box">
        <label>⏰ ميعاد الاستيقاظ لبدء المهمة:</label>
        <input type="time" id="wake" value="07:00">
    </div>

    <div class="box">
        <label>🔥 المادة البعبع (تركيز 200%):</label>
        <input type="text" id="boss" placeholder="المادة اللي شايلة همها">
    </div>

    <div id="subs_container">
        <div class="box">
            <label>📚 مواد إضافية للمراجعة:</label>
            <div id="subs_list">
                <input type="text" class="sub-in" placeholder="اسم المادة">
            </div>
            <button class="btn-plus" onclick="addInput('subs_list', 'اسم المادة')">+ إضافة مادة أخرى</button>
        </div>
    </div>

    <div class="box">
        <label>🚶 هل لديك دروس سنتر اليوم؟</label>
        <select id="is_lesson" onchange="checkLesson()">
            <option value="no">يوم منزلي (للمذاكرة المكثفة)</option>
            <option value="yes">نعم، لدي مواعيد سناتر</option>
        </select>
        
        <div id="lesson_zone" class="hidden" style="margin-top:20px; border-top: 1px dashed #334155; pt-15px;">
            <p style="font-size:0.8rem; color:#94a3b8;">أدخل مواعيد الدروس بدقة (من-إلى):</p>
            <div id="lessons_list">
                <div style="display:flex; gap:10px; margin-bottom:10px;">
                    <input type="time" class="l-start"> 
                    <input type="time" class="l-end" placeholder="النهاية">
                </div>
            </div>
            <button class="btn-plus" onclick="addLesson()">+ إضافة موعد درس آخر</button>
        </div>
    </div>

    <button class="btn-main" onclick="startAI()">توليد الجدول القتالي الآن 🔥</button>
</div>

<div id="capture-area" class="hidden">
    <div class="container">
        <div class="brand-header">
            <div class="brand-name">منصة ثانية ثانوي الرسمية</div>
            <p style="color:var(--primary); font-weight: bold; margin-bottom:0;" id="out_name"></p>
            <p style="color:#64748b; font-size:0.8rem;" id="out_goal"></p>
        </div>

        <div id="output"></div>

        <div class="footer-logo">
            <p>تم تصميم هذا الجدول بواسطة الذكاء الاصطناعي الخاص بـ</p>
            <p style="color:var(--primary); font-weight:900;">THANWYAA.GITHUB.IO/SAANAYE</p>
            <p>© 2026 جميع الحقوق محفوظة لمنصة ثانية ثانوي</p>
        </div>

        <div class="actions-grid no-print">
            <button class="btn-sub btn-img" onclick="saveImg()">📸 حفظ كصورة</button>
            <button class="btn-sub btn-pdf" onclick="savePdf()">📄 تحميل PDF</button>
            <button class="btn-sub btn-whatsapp" onclick="shareWhatsApp()">📢 مشاركة المنصة</button>
            <button class="btn-sub" style="background:#475569;" onclick="window.location.reload()">🔄 تعديل البيانات</button>
        </div>
    </div>
</div>

<script>
    const tips = [
        "ضع هاتفك في غرفة أخرى أثناء جلسة 'الوحش' 📵",
        "اشرب كوب ماء كل 45 دقيقة لتنشيط خلايا المخ 💧",
        "المذاكرة بـ 'ورقة وقلم' ترفع نسبة التركيز لـ 90% ✍️",
        "النجاح هو مجموع مجهودات صغيرة تتكرر كل يوم 🚀",
        "منصة ثانية ثانوي تثق في قدرتك على التغيير 🔥"
    ];

    function addInput(id, ph) {
        let i = document.createElement('input'); 
        i.type = 'text'; i.className = 'sub-in'; i.placeholder = ph; i.style.marginTop = "10px";
        document.getElementById(id).appendChild(i);
    }

    function addLesson() {
        let d = document.createElement('div'); d.style.display = 'flex'; d.style.gap = '10px'; d.style.marginTop = '10px';
        d.innerHTML = `<input type="time" class="l-start"> <input type="time" class="l-end">`;
        document.getElementById('lessons_list').appendChild(d);
    }

    function checkLesson() {
        document.getElementById('lesson_zone').classList.toggle('hidden', document.getElementById('is_lesson').value === 'no');
    }

    function toMin(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; }
    function toStr(m) { let hh = Math.floor(m/60)%24, mm = m%60, p = hh>=12?'م':'ص'; hh = hh%12||12; return `${hh}:${mm<10?'0'+mm:mm} ${p}`; }

    function startAI() {
        const name = document.getElementById('user_name').value || "بطل ثانية ثانوي";
        const goal = document.getElementById('user_goal').value || "النجاح والتفوق";
        let cur = toMin(document.getElementById('wake').value);
        let boss = document.getElementById('boss').value || "المادة الأساسية";
        let subs = Array.from(document.getElementsByClassName('sub-in')).map(i=>i.value).filter(v=>v);
        let lessons = Array.from(document.querySelectorAll('#lessons_list div')).map(d=>({s:toMin(d.children[0].value), e:toMin(d.children[1].value)})).filter(l=>l.s&&l.e).sort((a,b)=>a.s-b.s);

        document.getElementById('out_name').innerText = "المحارب: " + name;
        document.getElementById('out_goal').innerText = "الهدف اليومي: " + goal;

        let res = `<div style="background:rgba(0, 210, 255, 0.05); padding:15px; border-radius:15px; border:1px solid rgba(0,210,255,0.2); margin-bottom:20px; font-size:0.85rem; text-align:center; color:#cbd5e1;">💡 <b>نصيحة المنصة:</b> ${tips[Math.floor(Math.random()*tips.length)]}</div>`;

        // 1. بداية اليوم
        res += makeTask(cur, cur+45, "🌅 طقوس البداية", "صلاة الفجر/الصبح + فطور سريع + تجهيز المكتب. (بدون موبايل!)", "normal");
        cur += 45;

        // 2. جلسة الوحش
        res += makeTask(cur, cur+120, "⚔️ معركة الـ " + boss, "تركيز عميق (Deep Work). حل أصعب المسائل والأسئلة الآن.", "boss");
        cur += 135; // ساعتين وربع شاملة راحة صغيرة

        // 3. التعامل مع الدروس
        lessons.forEach((l, index) => {
            // وقت قبل الدرس لو فيه فراغ
            if (l.s - cur > 60) {
                res += makeTask(cur, l.s-40, "📖 مراجعة سريعة", "تجهيز واجب الدرس أو مراجعة الحصة السابقة.", "normal");
            }
            
            res += makeTask(l.s-40, l.e+45, "🚌 مهمة السنتر: درس رقم " + (index+1), "تشمل وقت المواصلات والحصة ووقت العودة للمنزل.", "lesson");
            cur = l.e + 60; // راحة بعد السنتر
        });

        // 4. المواد الإضافية
        subs.forEach(sub => {
            res += makeTask(cur, cur+60, "✅ إنجاز مادة: " + sub, "قراءة بتركيز + حل تطبيق شامل على ما تم ذاكرته.", "sub");
            cur += 80;
        });

        // 5. الختام
        res += makeTask(cur, cur+30, "🌙 مراجعة ليلية", "مراجعة العناوين الرئيسية لما تم إنجازه اليوم وتجهيز شنطة الغد.", "normal");

        document.getElementById('input-page').classList.add('hidden');
        document.getElementById('capture-area').classList.remove('hidden');
        document.getElementById('output').innerHTML = res;
    }

    function makeTask(s, e, title, desc, type) {
        let borderColor = "var(--primary)";
        if(type === 'boss') borderColor = "var(--accent)";
        if(type === 'lesson') borderColor = "#fbbf24";

        return `
            <div class="task" style="border-right-color: ${borderColor}">
                <div class="time-badge">${toStr(s)} - ${toStr(e)}</div>
                <h3>${title}</h3>
                <p>${desc}</p>
            </div>
        `;
    }

    // التصدير
    function saveImg() {
        const actions = document.querySelector('.no-print');
        actions.style.display = 'none';
        html2canvas(document.querySelector("#capture-area"), { backgroundColor: "#05070a", scale: 2 }).then(canvas => {
            let link = document.createElement('a');
            link.download = 'جدول_منصة_ثانية_ثانوي.png';
            link.href = canvas.toDataURL();
            link.click();
            actions.style.display = 'grid';
        });
    }

    function savePdf() {
        const actions = document.querySelector('.no-print');
        actions.style.display = 'none';
        const element = document.querySelector("#capture-area");
        const opt = {
            margin: 5, filename: 'Study_Plan_Official.pdf',
            image: { type: 'jpeg', quality: 0.98 },
            html2canvas: { scale: 2, backgroundColor: "#05070a" },
            jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save().then(() => { actions.style.display = 'grid'; });
    }

    function shareWhatsApp() {
        const text = "يا بطل، هندست جدولي الرسمي لثانية ثانوي بالذكاء الاصطناعي! 🔥🚀\nادخل اعمل جدولك الآن من هنا: https://thanwyaa.github.io/saanaye/";
        window.open(`https://wa.me/?text=${encodeURIComponent(text)}`);
    }
</script>
</body>
</html>
