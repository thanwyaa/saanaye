<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة ثانية ثانوي | نظام الماكينة V13.5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-purple: #9d00ff;
            --deep-space: #020205;
            --danger: #ff0055;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--deep-space);
            color: white;
            overflow-x: hidden;
            background: radial-gradient(circle at top right, #0a0a25 0%, #020205 100%);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(25px);
            border: 1px solid rgba(0, 243, 255, 0.15);
            border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.7);
        }

        .step-dot {
            width: 10px;
            height: 4px;
            border-radius: 20px;
            background: rgba(255,255,255,0.1);
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .step-dot.active {
            background: var(--neon-cyan);
            width: 30px;
            box-shadow: 0 0 15px var(--neon-cyan);
        }

        .btn-action {
            background: linear-gradient(135deg, var(--neon-cyan), var(--neon-purple));
            color: black;
            font-weight: 900;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-action:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.4);
        }

        .schedule-item {
            border-right: 5px solid var(--neon-cyan);
            background: rgba(255, 255, 255, 0.03);
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 15px 0 0 15px;
            transition: 0.3s;
        }

        .schedule-item:hover { background: rgba(255, 255, 255, 0.07); transform: translateX(-5px); }
        .type-lesson { border-right-color: var(--neon-purple); }
        .type-break { border-right-color: #00ff88; }
        .type-monster { border-right-color: var(--danger); box-shadow: inset 50px 0 50px -50px rgba(255, 0, 85, 0.2); }
        .type-warning { border-right-color: #ff9900; background: rgba(255, 153, 0, 0.05); }

        input, select {
            background: rgba(0, 0, 0, 0.6) !important;
            border: 2px solid rgba(255, 255, 255, 0.05) !important;
            color: var(--neon-cyan) !important;
            text-align: center;
            font-weight: 700;
        }

        input:focus { border-color: var(--neon-cyan) !important; box-shadow: 0 0 15px rgba(0, 243, 255, 0.2); }

        .hidden-step { display: none; }
        .active-step { display: flex; animation: fadeIn 0.6s forwards; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center py-10 px-4">

    <div class="w-full max-w-2xl mb-10 text-center">
        <h2 class="text-xs font-black tracking-[0.5em] text-cyan-500 mb-4 opacity-70 uppercase">Titan Protocol V13.5</h2>
        <div id="dots-container" class="flex justify-center gap-2 mb-4"></div>
        <div class="text-xs font-bold text-gray-500">جاري معالجة البيانات: <span id="percent" class="text-white">0%</span></div>
    </div>

    <main class="w-full max-w-2xl">
        
        <div id="wizard-view" class="glass-card p-8 md:p-14 relative overflow-hidden">
            <div id="chat-box" class="min-h-[300px] flex flex-col justify-center items-center text-center">
                <div id="bot-bubble" class="text-2xl md:text-3xl font-black mb-10 leading-tight">
                    </div>
                <div id="input-container" class="w-full">
                    </div>
            </div>

            <div class="flex justify-between items-center mt-12 pt-8 border-t border-white/5">
                <button id="btn-back" onclick="handleBack()" class="text-gray-500 hover:text-white font-black text-sm transition hidden uppercase">رجوع</button>
                <button id="btn-next" onclick="handleNext()" class="btn-action px-12 py-4 rounded-2xl mr-auto flex items-center gap-2">
                    <span>استمرار</span>
                    <i class="fas fa-chevron-left text-xs"></i>
                </button>
            </div>
        </div>

        <div id="result-view" class="hidden">
            <div id="schedule-capture" class="bg-[#020205] p-8 border-2 border-white/5 rounded-[2.5rem] mb-8 relative">
                <div class="absolute top-0 right-0 p-8 opacity-10">
                    <i class="fas fa-shield-halved text-6xl"></i>
                </div>
                
                <div class="text-center mb-10">
                    <div class="text-[10px] text-cyan-400 font-black tracking-widest uppercase mb-2">The Official Schedule</div>
                    <h1 class="text-3xl font-black text-white italic">دستور ثانية ثانوي الرسمي</h1>
                    <p id="res-student-info" class="text-gray-500 text-xs mt-2 font-bold"></p>
                </div>
                
                <div id="schedule-list" class="space-y-4"></div>

                <div class="mt-12 p-6 bg-gradient-to-r from-red-900/20 to-transparent border-r-4 border-red-500 rounded-xl">
                    <h4 class="text-red-500 font-black text-sm mb-2 flex items-center gap-2">
                        <i class="fas fa-triangle-exclamation"></i> تحذير من الماكينة:
                    </h4>
                    <p class="text-[11px] text-gray-400 leading-relaxed font-bold">
                        الجدول ده مش مجرد ورق، ده ميثاق نجاح. الموبايل هو العدو الأول في ساعات "الوحش". لو كسرت الجدول النهاردة، إنت بتكسر حلمك بكرة.
                    </p>
                </div>

                <div class="mt-8 pt-6 border-t border-white/5 text-center">
                    <p class="text-[9px] text-gray-800 font-black tracking-[0.3em] uppercase">thanwyaa.github.io/saanaye/</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-6">
                <button onclick="takeScreenshot()" class="bg-white/5 hover:bg-white/10 p-5 rounded-3xl font-black border border-white/10 transition flex flex-col items-center gap-2">
                    <i class="fas fa-camera text-cyan-400"></i>
                    <span class="text-xs uppercase">حفظ كصورة</span>
                </button>
                <button onclick="shareWhatsApp()" class="bg-green-600/10 hover:bg-green-600/20 p-5 rounded-3xl font-black border border-green-600/20 transition flex flex-col items-center gap-2">
                    <i class="fab fa-whatsapp text-green-500"></i>
                    <span class="text-xs uppercase">شير مع المحاربين</span>
                </button>
            </div>
            <button onclick="location.reload()" class="w-full text-gray-600 text-[10px] font-bold hover:text-white transition uppercase tracking-widest">إنشاء خطة جديدة لليوم القادم</button>
        </div>
    </main>

    <script>
        let currentStep = 0;
        let responses = {};
        
        const workflow = [
            { id: 'name', q: "أهلاً بك في نظام الماكينة.. اسم المحارب إيه؟", type: 'text' },
            { id: 'shoba', q: "منور يا [name].. إنت شعبة (علمي علوم) ولا (رياضة) ولا (أدبي)؟", type: 'select', options: ['علمي علوم', 'علمي رياضة', 'أدبي'] },
            { id: 'wake_up', q: "ساعة الصفر (هتصحى كام؟)", type: 'time', default: '07:00' },
            { id: 'monster', q: "إيه أكتر مادة بتخاف منها ومحتاجين نخلص عليها؟", type: 'text' },
            { id: 'easy', q: "وإيه المادة اللي بتستمتع بمذاكرتها وفهمها؟", type: 'text' },
            { id: 'lesson_count', q: "عندك كام درس النهاردة؟ (0 لـ 4)", type: 'number', min: 0, max: 4 },
            { id: 'phone_time', q: "بتضيع كام ساعة على السوشيال ميديا في العادي؟", type: 'number', min: 0 },
            { id: 'reward', q: "إيه الجائزة اللي هتدلع بيها نفسك لما تخلص؟", type: 'text' },
            { id: 'motivation', q: "كلمة تشجعك لما تحس إنك تعبت؟", type: 'text' },
            { id: 'final_step', q: "المحرك جاهز لتوليد جدولك القتالي يا [name].. جاهز للانطلاق؟", type: 'info' }
        ];

        function createDots() {
            const container = document.getElementById('dots-container');
            container.innerHTML = '';
            workflow.forEach((_, i) => {
                const dot = document.createElement('div');
                dot.className = `step-dot ${i <= currentStep ? 'active' : ''}`;
                container.appendChild(dot);
            });
            document.getElementById('percent').innerText = Math.round((currentStep / (workflow.length - 1)) * 100) + "%";
        }

        function renderStep() {
            const step = workflow[currentStep];
            let qText = step.q.replace('[name]', responses.name || 'يا بطل');
            document.getElementById('bot-bubble').innerText = qText;
            
            const container = document.getElementById('input-container');
            container.innerHTML = '';

            if (step.type === 'text' || step.type === 'number') {
                const el = document.createElement('input');
                el.type = step.type;
                el.placeholder = "اكتب هنا...";
                el.className = "w-full p-5 rounded-2xl text-2xl outline-none transition-all";
                el.value = responses[step.id] || '';
                container.appendChild(el);
                el.focus();
            } else if (step.type === 'select') {
                const el = document.createElement('select');
                el.className = "w-full p-5 rounded-2xl text-2xl outline-none appearance-none cursor-pointer";
                step.options.forEach(opt => {
                    const o = document.createElement('option');
                    o.value = opt; o.innerText = opt;
                    el.appendChild(o);
                });
                el.value = responses[step.id] || step.options[0];
                container.appendChild(el);
            } else if (step.type === 'time') {
                const el = document.createElement('input');
                el.type = 'time';
                el.className = "w-full p-5 rounded-2xl text-2xl outline-none";
                el.value = responses[step.id] || step.default;
                container.appendChild(el);
            }

            document.getElementById('btn-back').classList.toggle('hidden', currentStep === 0);
            document.getElementById('btn-next').innerText = currentStep === workflow.length - 1 ? "توليد الجدول" : "استمرار";
            createDots();
        }

        function handleNext() {
            const step = workflow[currentStep];
            const input = document.querySelector('#input-container input, #input-container select');
            
            if (input && step.type !== 'info' && !input.value) {
                alert("يا بطل، الخانة دي إجبارية عشان الجدول يطلع مظبوط!");
                return;
            }

            if (input) responses[step.id] = input.value;

            if (step.id === 'lesson_count') {
                const count = parseInt(responses.lesson_count);
                workflow.splice(currentStep + 1, workflow.filter(w => w.dynamic).length);
                for(let i=1; i<=count; i++) {
                    workflow.splice(currentStep + i*2 - 1, 0, 
                        { id: `l_${i}_name`, q: `اسم مادة الدرس رقم ${i}؟`, type: 'text', dynamic: true },
                        { id: `l_${i}_time`, q: `ميعاد درس ${i} هيبدأ كام؟`, type: 'time', default: '14:00', dynamic: true }
                    );
                }
            }

            if (currentStep < workflow.length - 1) {
                currentStep++;
                renderStep();
            } else {
                showSchedule();
            }
        }

        function handleBack() {
            if (currentStep > 0) {
                currentStep--;
                renderStep();
            }
        }

        function showSchedule() {
            document.getElementById('wizard-view').classList.add('hidden');
            document.getElementById('result-view').classList.remove('active-step'); 
            document.getElementById('result-view').style.display = 'block';
            document.getElementById('res-student-info').innerText = `${responses.name} | شعبة ${responses.shoba} | الهدف: النجاح الساحق`;

            const list = document.getElementById('schedule-list');
            list.innerHTML = '';
            
            let time = responses.wake_up;
            const addItem = (t, act, note, type) => {
                const item = document.createElement('div');
                item.className = `schedule-item type-${type}`;
                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-cyan-400 font-black text-xs tracking-tighter">${t}</span>
                        <span class="font-black text-sm text-white text-right flex-1 px-4">${act}</span>
                    </div>
                    <div class="text-[10px] text-gray-500 text-right mt-1 italic">${note}</div>
                `;
                list.appendChild(item);
            };

            const addMins = (t, m) => {
                let [h, min] = t.split(':').map(Number);
                let d = new Date(); d.setHours(h, min + m);
                return `${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
            };

            addItem(time, "الاستيقاظ + الصلاة + الفطور", "ممنوع لمس الهاتف تماماً في هذه المرحلة", "break");
            
            time = addMins(time, 45);
            addItem(time, `جلسة الوحش: ${responses.monster}`, "تركيز عميق 100%، هذه المادة تحدد مستقبلك", "monster");
            
            time = addMins(time, 120);
            addItem(time, "استراحة تجديد الطاقة", "شرب مياه + تمارین إطالة بسيطة", "break");

            let lCount = parseInt(responses.lesson_count);
            let lessons = [];
            for(let i=1; i<=lCount; i++) {
                lessons.push({ name: responses[`l_${i}_name`], t: responses[`l_${i}_time`] });
            }
            lessons.sort((a,b) => a.t.localeCompare(b.t));

            if(lCount === 0) {
                addItem(time, "مذاكرة مكثفة + حل امتحانات", "يوم بدون دروس يعني يوم إنجاز عالمي", "monster");
                time = addMins(time, 120);
            }

            lessons.forEach(l => {
                addItem(addMins(l.t, -45), `تجهيز وتحرك لدرس ${l.name}`, "وقت المواصلات (ممنوع ضياع التركيز)", "lesson");
                addItem(l.t, `حضور درس ${l.name}`, "ركز في كل كلمة، أنت بطل", "lesson");
                addItem(addMins(l.t, 120), "ساعة راحة وفصلان (إجباري)", "ارتاح من تعب السنتر عشان تقدر تكمل", "break");
                time = addMins(l.t, 180);
            });

            addItem(time, "تحذير: منطقة خطر (المشتتات)", `ارمي الموبايل فوراً، ركز في ${responses.easy}`, "warning");
            
            time = addMins(time, 20);
            addItem(time, `مذاكرة المادة الحبيبة: ${responses.easy}`, "وقت الاستمتاع بالمعلومات الخفيفة", "break");

            addItem(addMins(time, 90), `وقت الجائزة: ${responses.reward}`, "إنجاز عظيم! استمتع بمكافأتك", "break");
            addItem("23:00", "النوم (إعادة شحن الماكينة)", "مخك بيثبت المعلومات دلوقتي، تصبح على خير", "monster");
        }

        function takeScreenshot() {
            const area = document.getElementById('schedule-capture');
            html2canvas(area, { 
                scale: 3,
                backgroundColor: '#020205',
                useCORS: true 
            }).then(canvas => {
                const link = document.createElement('a');
                link.download = `جدول_تانية_ثانوي_الرسمي.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }

        function shareWhatsApp() {
            const msg = encodeURIComponent("يا بطل، أنا هندست جدولي الرسمي لثانية ثانوي على الماكينة الذكية! تعال اعمل جدولك إنت كمان ووريني همتك: https://thanwyaa.github.io/saanaye/");
            window.open(`https://wa.me/?text=${msg}`);
        }

        window.onload = renderStep;
    </script>
</body>
</html>
