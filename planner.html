<div id="smart-planner" style="max-width: 800px; margin: 20px auto; background: #fff; padding: 25px; border-radius: 25px; border: 5px solid #2563eb; direction: rtl; font-family: 'Cairo', sans-serif;">
    <div id="setup-steps">
        <h2 style="color: #1e40af; text-align: center;">🧠 مخطط الأزمات الذكي (تانية ثانوي)</h2>
        <p style="text-align: center; color: #64748b;">هسألك أسئلة دقيقة عشان أطلعلك جدول "مستحيل" تلاقيه في موقع تاني..</p>
        <hr>
        <div id="question-container" style="margin-top: 20px;">
            <p id="q-text" style="font-size: 1.3rem; font-weight: bold;"></p>
            <div id="input-area"></div>
            <button onclick="handleLogic()" style="background: #2563eb; color: white; border: none; padding: 15px; border-radius: 12px; width: 100%; cursor: pointer; font-size: 1.1rem; margin-top: 15px;">المتابعة للخطوة التالية ⬅️</button>
        </div>
    </div>

    <div id="final-result" style="display: none;">
        <div id="capture-area" style="padding: 20px; border: 2px solid #000; background: #fefce8;">
            <h2 style="text-align: center; color: #b91c1c;">📋 جدول الإنقاذ لليوم</h2>
            <div id="schedule-output"></div>
        </div>
        <button onclick="window.print()" style="margin-top: 20px; width: 100%; padding: 10px; background: #059669; color: white; border-radius: 10px; border: none; cursor: pointer;">🖨️ حفظ كـ PDF أو سكرين شوت</button>
    </div>
</div>

<script>
let step = 0;
let data = {};
const questions = [
    { t: "ناوي تصحى من النوم الساعة كام بالظبط؟ (مثلاً 07:00)", type: "time" },
    { t: "عندك دروس 'بره البيت' (سنتر) النهاردة؟", type: "select", options: ["لأ، كلي أونلاين", "آه، عندي سنتر"] },
    { t: "لو عندك سنتر، هتبدأ الساعة كام وترجع البيت الساعة كام؟", type: "text", placeholder: "من 2 لـ 5" },
    { t: "بتاخد كام دقيقة مواصلات (رايح جاي)؟", type: "number" },
    { t: "إيه أكتر مادة 'مسببة لك رعب' وعاوز تخلص منها؟", type: "text" },
    { t: "إيه المواد التانية اللي عاوز تذاكرها (اكتبهم وبينهم - )؟", type: "text" },
    { t: "بتحب تذاكر 'بلوكات' طويلة (ساعتين) ولا فترات قصيرة (50 دقيقة)؟", type: "select", options: ["بلوكات طويلة", "فترات قصيرة (بومودورو)"] },
    { t: "عندك ماتش أو مشوار غير المذاكرة؟ الساعة كام؟", type: "text" },
    { t: "بتحتاج وقت قد إيه للأكل والراحة الإجمالية؟ (بالساعات)", type: "number" }
];

function showQuestion() {
    let q = questions[step];
    document.getElementById('q-text').innerText = q.t;
    let area = document.getElementById('input-area');
    area.innerHTML = "";
    if(q.type === "select") {
        let s = `<select id="ans" style="width:100%; padding:10px; border-radius:10px;">`;
        q.options.forEach(opt => s += `<option value="${opt}">${opt}</option>`);
        area.innerHTML = s + `</select>`;
    } else {
        area.innerHTML = `<input type="${q.type}" id="ans" placeholder="${q.placeholder || ''}" style="width:95%; padding:12px; border-radius:10px; border:1px solid #ccc;">`;
    }
}

function handleLogic() {
    data[step] = document.getElementById('ans').value;
    step++;
    if(step < questions.length) {
        showQuestion();
    } else {
        generateSmartTable();
    }
}

function generateSmartTable() {
    document.getElementById('setup-steps').style.display = "none";
    document.getElementById('final-result').style.display = "block";
    
    let isCenter = data[1] === "آه، عندي سنتر";
    let output = `
        <table style="width: 100%; border: 2px solid #000; text-align: center;">
            <tr style="background: #000; color: #fff;"><th>التوقيت</th><th>النشاط</th><th>الحالة</th></tr>
            <tr><td>${data[0]}</td><td>الاستيقاظ + طقوس البداية ☕</td><td>نشاط 100%</td></tr>
            <tr><td>بداية اليوم</td><td>تركيز على <b>${data[4]}</b> (المادة البعبع)</td><td>أولوية قصوى</td></tr>
            <tr style="background: ${isCenter ? '#fee2e2' : '#f0f9ff'}">
                <td>فترة الدروس</td>
                <td>${isCenter ? 'مشوار السنتر + الدرس' : 'مذاكرة أونلاين في البيت'}</td>
                <td>${isCenter ? 'استنزاف طاقة' : 'توفير وقت'}</td>
            </tr>
            <tr><td>بعد العودة</td><td>راحة إجبارية + وجبة الغداء</td><td>فصلان</td></tr>
            <tr><td>المساء</td><td>توزيع مواد: ${data[5]}</td><td>هدوء</td></tr>
            <tr style="border-top: 2px solid #000;"><td>رسالة الموقع</td><td colspan="2"><b>أنت بطل يا ${data[4] ? 'صاحب الطموح' : ''}.. الجدول ده معمول عشان يخليك تسيطر!</b></td></tr>
        </table>
    `;
    document.getElementById('schedule-output').innerHTML = output;
}

showQuestion();
</script>
