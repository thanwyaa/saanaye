<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Command Center | المخطط العبقري</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background: #020617; color: #f8fafc; margin: 0; padding: 20px; }
        .card { max-width: 600px; margin: auto; background: #0f172a; border-radius: 20px; padding: 25px; border: 2px solid #3b82f6; box-shadow: 0 0 30px rgba(59, 130, 246, 0.2); }
        input, select { width: 90%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #334155; background: #1e293b; color: white; }
        button { width: 100%; padding: 15px; background: #3b82f6; color: white; border: none; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.3s; }
        button:hover { background: #2563eb; transform: scale(1.02); }
        .step { display: none; }
        .step.active { display: block; }
        .task-card { background: #1e293b; border-right: 6px solid #3b82f6; padding: 15px; margin: 15px 0; border-radius: 8px; }
        .time-tag { color: #60a5fa; font-weight: bold; font-size: 0.9rem; }
        .nav-back { margin-bottom: 20px; display: inline-block; color: #94a3b8; text-decoration: none; }
    </style>
</head>
<body>

<a href="index.html" class="nav-back">⬅️ رجوع للمنصة</a>

<div class="card" id="main-card">
    <div id="steps-container">
        <div class="step active" id="step0">
            <h2>مرحلة تحليل البيانات 🧠</h2>
            <p>بتصحى الساعة كام بالظبط؟ (مثلاً 07:00)</p>
            <input type="time" id="wake_time" value="07:00">
            <p>عندك درس بره البيت (سنتر)؟</p>
            <select id="has_center">
                <option value="no">لأ، يومي كله في البيت</option>
                <option value="yes">آه، عندي سنتر</option>
            </select>
            <button onclick="nextStep(1)">الخطوة التالية</button>
        </div>

        <div class="step" id="step1">
            <h2>تحديد الأولويات 🎯</h2>
            <p>إيه "البعبع" (أصعب مادة) اللي شاغلة بالك؟</p>
            <input type="text" id="hard_sub" placeholder="فيزياء، كيمياء...">
            <p>اكتب مادتين تانيين (افصل بينهم بـ - )</p>
            <input type="text" id="easy_subs" placeholder="عربي - إنجليزي">
            <button onclick="generateAIPlan()">توليد الخطة العبقرية 🔥</button>
        </div>
    </div>

    <div id="result" style="display:none;">
        <h1 style="text-align: center; color: #3b82f6;">COMMAND CENTER</h1>
        <div id="ai-content"></div>
        <button onclick="window.print()" style="margin-top: 20px; background: #059669;">📸 خد سكرين شوت للجدول</button>
    </div>
</div>

<script>
    function nextStep(s) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        document.getElementById('step' + s).classList.add('active');
    }

    function generateAIPlan() {
        const wake = document.getElementById('wake_time').value;
        const hard = document.getElementById('hard_sub').value;
        const easy = document.getElementById('easy_subs').value.split('-');
        const hasCenter = document.getElementById('has_center').value;

        let [h, m] = wake.split(':').map(Number);
        let currentMins = h * 60 + m;

        function format(mins) {
            let hh = Math.floor(mins / 60) % 24;
            let mm = mins % 60;
            let ampm = hh >= 12 ? 'م' : 'ص';
            hh = hh % 12 || 12;
            return `${hh}:${mm < 10 ? '0' + mm : mm} ${ampm}`;
        }

        let html = `<p style="background:#334155; padding:10px; border-radius:10px; text-align:center;">يومك متفصل بالدقيقة بناءً على طاقة مخك</p>`;

        // 1. المهمة الانتحارية (ساعتين ونصف)
        let end1 = currentMins + 150;
        html += `<div class="task-card">
            <div class="time-tag">${format(currentMins)} - ${format(end1)}</div>
            <h3>🔥 مهمة كسر العظام: ${hard}</h3>
            <p>ده وقت ذروة هرمونات التركيز. ممنوع تلمس الموبايل. خلص 3 دروس كاملين.</p>
        </div>`;
        
        currentMins = end1 + 30; // راحة

        // 2. بلوك السنتر أو المذاكرة التانية
        if(hasCenter === 'yes') {
            let endC = currentMins + 240;
            html += `<div class="task-card" style="border-right-color: #ef4444;">
                <div class="time-tag">${format(currentMins)} - ${format(endC)}</div>
                <h3>🚶 مشوار السنتر + الدرس</h3>
                <p>استغل وقت المواصلات في سماع كلمات أو مراجعة سريعة. أول ما ترجع ليك نص ساعة فصلان.</p>
            </div>`;
            currentMins = endC + 45;
        }

        // 3. المواد السهلة
        easy.forEach(s => {
            let endS = currentMins + 60;
            html += `<div class="task-card" style="border-right-color: #10b981;">
                <div class="time-tag">${format(currentMins)} - ${format(endS)}</div>
                <h3>✅ تصفية حسابات: ${s}</h3>
                <p>حل وتطبيق فقط. مخك دلوقتي مش بتاع فهم عميق، هو بتاع "تخليص مهام".</p>
            </div>`;
            currentMins = endS + 15;
        });

        html += `<div style="text-align:center; padding:15px; border:2px dashed #3b82f6; margin-top:10px;">
            <b>نصيحة الـ AI:</b> نام قبل الساعة 12 عشان بكرة عندك معركة تانية! 😴
        </div>`;

        document.getElementById('steps-container').style.display = 'none';
        document.getElementById('result').style.display = 'block';
        document.getElementById('ai-content').innerHTML = html;
    }
</script>
</body>
</html>
