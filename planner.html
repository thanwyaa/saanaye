<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Command Center | ثانية ثانوي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root { --main: #00f2ff; --danger: #ff0055; --bg: #050505; --panel: #111; }
        body { font-family: 'Cairo', sans-serif; background: var(--bg); color: #fff; margin: 0; padding: 15px; }
        .ai-card { max-width: 600px; margin: auto; background: var(--panel); border-radius: 15px; padding: 25px; border: 1px solid #333; box-shadow: 0 0 20px rgba(0,242,255,0.1); }
        h1 { color: var(--main); text-align: center; font-weight: 900; letter-spacing: -1px; margin-bottom: 30px; }
        .q-box { background: #1a1a1a; padding: 15px; border-radius: 12px; margin-bottom: 20px; border-right: 4px solid var(--main); }
        label { display: block; margin-bottom: 10px; font-weight: bold; color: #aaa; font-size: 0.9rem; }
        input, select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #000; color: var(--main); font-family: 'Cairo'; margin-bottom: 10px; }
        .btn-ai { width: 100%; padding: 18px; background: var(--main); color: #000; border: none; border-radius: 10px; font-weight: 900; font-size: 1.2rem; cursor: pointer; transition: 0.3s; }
        .btn-ai:hover { box-shadow: 0 0 20px var(--main); transform: scale(1.02); }
        .task { background: #000; border: 1px solid #222; padding: 15px; margin: 15px 0; border-radius: 10px; border-right: 5px solid var(--main); position: relative; }
        .task.lesson { border-right-color: var(--danger); }
        .time-tag { position: absolute; left: 10px; top: 10px; background: #222; padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; color: var(--main); }
        .footer-promo { text-align: center; border-top: 1px solid #333; margin-top: 20px; padding: 10px; font-size: 0.8rem; color: var(--main); }
        .hidden { display: none; }
        .btn-share { background: #25d366; color: #fff; margin-top: 10px; }
        .btn-pdf { background: #ff5722; color: #fff; margin-top: 10px; }
    </style>
</head>
<body>

<div class="ai-card" id="setup">
    <h1>OPERATIONAL LOGIC V7</h1>
    
    <div class="q-box">
        <label>⏰ هتفوق من الغيبوبة (تصحى) الساعة كام؟</label>
        <input type="time" id="wake" value="08:00">
    </div>

    <div class="q-box">
        <label>🎯 إيه المادة اللي "قارفة" عيشتك وعايز تدوس عليها؟</label>
        <input type="text" id="boss" placeholder="فيزياء، رياضة..">
    </div>

    <div id="subs-cont" class="q-box">
        <label>📚 باقي المهام (اكتب المادة ودوس +):</label>
        <div id="subs-list"><input type="text" class="sub-in" placeholder="مادة إضافية"></div>
        <button onclick="addIn('subs-list','sub-in')" style="background:none; border:1px dashed var(--main); color:var(--main); width:100%; margin-top:5px; border-radius:5px; cursor:pointer;">+ إضافة مادة</button>
    </div>

    <div class="q-box">
        <label>🚶 الدروس (السناتر قتلتنا):</label>
        <div id="lessons-list">
            <div style="display:flex; gap:5px;"><input type="time" class="l-s" placeholder="بدء"> <input type="time" class="l-e" placeholder="انتهاء"></div>
        </div>
        <button onclick="addLesson()" style="background:none; border:1px dashed var(--danger); color:var(--danger); width:100%; margin-top:5px; border-radius:5px; cursor:pointer;">+ إضافة درس</button>
    </div>

    <div class="q-box">
        <label>🧠 مودك إيه النهاردة؟ (الـ AI هيوزع المجهود بناءً عليه):</label>
        <select id="mood">
            <option value="beast">وحش كاسح - هفرم المنهج 🔥</option>
            <option value="chill">رايق - بس عايز أنجز ☕</option>
            <option value="dead">ميت - عايز أنقذ ما يمكن إنقاذه 💀</option>
        </select>
    </div>

    <button class="btn-ai" onclick="generate()">تفعيل البروتوكول الذكي 🔥</button>
</div>

<div class="ai-card hidden" id="result">
    <div id="pdf-area">
        <h2 style="text-align:center; color:var(--main);">MISSION REPORT 📑</h2>
        <p id="status-msg" style="text-align:center; font-size:0.8rem; color:#888;"></p>
        <div id="schedule"></div>
        <div class="footer-promo">
            🚀 تم التخطيط بواسطة "محرك ثانية ثانوي الذكي" <br>
            thanwyaa.github.io
        </div>
    </div>
    
    <button class="btn-ai btn-pdf" onclick="savePDF()">📥 حفظ كـ PDF (احترافي)</button>
    <button class="btn-ai btn-share" onclick="share()">📤 مشاركة مع "الفشلة" صحابك</button>
    <button class="btn-ai" style="background:#333; color:#fff; margin-top:10px;" onclick="window.location.reload()">🔄 إعادة المحاولة</button>
</div>

<script>
const aiQuotes = [
    "المنهج مش صعب، أنت اللي سحلت نفسك في التيك توك. ابدأ!",
    "لو تانية ثانوي عدت بسلام، الباقي لعب عيال. دوس!",
    "المستقبل مش مستني حد، يا تفرم يا تتفرم.",
    "الذكاء الحقيقي إنك تبدأ وأنت مش طايق نفسك."
];

function addIn(p, c) {
    let i = document.createElement('input'); i.className = c; i.placeholder = "مادة تانية";
    document.getElementById(p).appendChild(i);
}

function addLesson() {
    let d = document.createElement('div'); d.style.display="flex"; d.style.gap="5px";
    d.innerHTML = `<input type="time" class="l-s"> <input type="time" class="l-e">`;
    document.getElementById('lessons-list').appendChild(d);
}

function toMin(t) { let [h, m] = t.split(':').map(Number); return h * 60 + m; }
function toStr(m) { let hh = Math.floor(m/60)%24, mm = m%60, p = hh>=12?'م':'ص'; hh = hh%12||12; return `${hh}:${mm<10?'0'+mm:mm} ${p}`; }

function generate() {
    let cur = toMin(document.getElementById('wake').value);
    let boss = document.getElementById('boss').value;
    let mood = document.getElementById('mood').value;
    let subs = Array.from(document.getElementsByClassName('sub-in')).map(i=>i.value).filter(v=>v);
    let lessons = Array.from(document.querySelectorAll('#lessons-list div')).map(d=>({s:toMin(d.children[0].value), e:toMin(d.children[1].value)})).filter(l=>l.s&&l.e).sort((a,b)=>a.s-b.s);

    let html = `<div style="padding:10px; background:#222; border-radius:8px; margin-bottom:15px; font-size:0.8rem; border-left:4px solid var(--main);">🤖 <b>توجيه الـ AI:</b> ${aiQuotes[Math.floor(Math.random()*aiQuotes.length)]}</div>`;

    // 1. بلوك الوحش
    let bossDuration = mood === 'beast' ? 180 : (mood === 'chill' ? 120 : 60);
    html += `<div class="task"><span class="time-tag">${toStr(cur)} - ${toStr(cur+bossDuration)}</span><h3>🚀 المهمة الانتحارية: ${boss}</h3><p style="font-size:0.8rem; color:#888;">تركيز مطلق بنظام الـ Deep Work. الموبيل بره الأوضة!</p></div>`;
    cur += bossDuration + 30;

    // 2. توزيع الباقي مع فحص الدروس
    subs.forEach(s => {
        lessons.forEach(l => {
            if (cur + 30 > l.s - 45 && cur < l.e) {
                html += `<div class="task lesson"><span class="time-tag">${toStr(l.s-45)} - ${toStr(l.e+45)}</span><h3>🚧 استنزاف: الدرس والمواصلات</h3><p style="font-size:0.8rem; color:#888;">وقت مستقطع للسنتر. اشحن طاقتك.</p></div>`;
                cur = l.e + 45;
            }
        });
        html += `<div class="task"><span class="time-tag">${toStr(cur)} - ${toStr(cur+60)}</span><h3>✅ تصفية: ${s}</h3><p style="font-size:0.8rem; color:#888;">حل تمارين وسد ثغرات. أنجز!</p></div>`;
        cur += 75;
    });

    document.getElementById('setup').classList.add('hidden');
    document.getElementById('result').classList.remove('hidden');
    document.getElementById('schedule').innerHTML = html;
    document.getElementById('status-msg').innerText = `تم تحليل البيانات بنجاح.. وضع التشغيل: ${mood}`;
}

function savePDF() {
    const opt = { margin: 10, filename: 'AI_Plan.pdf', image: { type: 'jpeg', quality: 0.98 }, html2canvas: { scale: 2, backgroundColor: '#050505' }, jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' } };
    html2pdf().set(opt).from(document.getElementById('pdf-area')).save();
}

function share() {
    if (navigator.share) {
        navigator.share({ title: 'AI Planner', text: 'جدولي طالع من المخابرات! شوف المنصة دي:', url: 'https://thanwyaa.github.io' });
    }
}
</script>
</body>
</html>
