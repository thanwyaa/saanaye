<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مركز القيادة | ثانية ثانوي</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/all.min.css">
    <style>
        :root { --neon-blue: #00d2ff; --neon-purple: #9d50bb; --dark: #0f0c29; }
        body { background: var(--dark); background: linear-gradient(to right, #24243e, #302b63, #0f0c29); color: white; font-family: 'Cairo', sans-serif; margin: 0; overflow-x: hidden; }
        
        .dashboard { max-width: 1100px; margin: auto; padding: 20px; }
        .header { text-align: center; padding: 40px 0; animation: fadeIn 2s; }
        .header h1 { font-size: 3rem; text-shadow: 0 0 20px var(--neon-blue); margin: 0; }

        .grid-layout { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 25px; }

        /* كروت النيون */
        .glass-card { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 20px; padding: 25px; transition: 0.3s; position: relative; overflow: hidden; }
        .glass-card:hover { transform: translateY(-10px); border-color: var(--neon-blue); box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); }

        /* المؤقت الدائري */
        .timer-circle { width: 180px; height: 180px; border-radius: 50%; border: 8px solid #1a1a1a; border-top: 8px solid var(--neon-blue); margin: 20px auto; display: flex; align-items: center; justify-content: center; font-size: 2.5rem; font-weight: bold; animation: spin 2s linear infinite paused; }
        .timer-active { animation-play-state: running; }

        /* قائمة المهام */
        .task-input-box { display: flex; gap: 10px; margin-bottom: 20px; }
        input { background: rgba(255,255,255,0.1); border: none; padding: 12px; border-radius: 10px; color: white; flex: 1; outline: none; }
        .task-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; animation: slideIn 0.4s; }
        .btn-done { background: var(--neon-blue); border: none; padding: 8px 15px; border-radius: 8px; color: var(--dark); font-weight: bold; cursor: pointer; }

        /* رتبة البطل */
        .rank-badge { background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple)); padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; }

        @keyframes spin { 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="dashboard">
    <div class="header">
        <span class="rank-badge">رتبة الطالب: <span id="rankText">محارب مبتدئ</span></span>
        <h1>COMMAND CENTER</h1>
        <p style="color: var(--neon-blue)">أنت الآن في وضع التركيز الأقصى</p>
    </div>

    <div class="grid-layout">
        <div class="glass-card" style="text-align: center;">
            <h3 style="color: var(--neon-blue)"><i class="fas fa-microchip"></i> محرك التركيز</h3>
            <div class="timer-circle" id="circle">
                <span id="display">25:00</span>
            </div>
            <div style="margin-top: 10px;">
                <input type="number" id="mins" value="25" style="width: 60px; text-align: center;">
            </div>
            <button onclick="start()" class="btn-done" style="margin-top: 20px; width: 100%; font-size: 1.1rem;">إطلاق المحرك</button>
            <button onclick="reset()" style="background: none; border: none; color: #888; margin-top: 10px; cursor: pointer;">إعادة تعيين</button>
        </div>

        <div class="glass-card">
            <h3 style="color: var(--neon-purple)"><i class="fas fa-crosshairs"></i> الأهداف الحالية (XP)</h3>
            <div class="task-input-box">
                <input type="text" id="tIn" placeholder="أدخل هدفك القادم...">
                <button onclick="addT()" class="btn-done"><i class="fas fa-plus"></i></button>
            </div>
            <div id="tList"></div>
        </div>

        <div class="glass-card">
            <h3 style="color: #00ff88;"><i class="fas fa-users"></i> رادار النخبة</h3>
            <p style="font-size: 0.9rem; opacity: 0.8;">انضم لتحدي الـ 24 ساعة مع زملائك. القواعد صارمة: صور، أنجز، انتصر.</p>
            <div style="background: rgba(0, 255, 136, 0.1); padding: 15px; border-radius: 10px; border-left: 4px solid #00ff88;">
                <li style="list-style: none; font-size: 0.8rem; margin-bottom: 5px;">⚡ تحديث واحد كل ساعة.</li>
                <li style="list-style: none; font-size: 0.8rem;">⚡ ممنوع الدردشة خارج المذاكرة.</li>
            </div>
            <a href="رابط_جروبك" class="btn-done" style="display: block; text-align: center; text-decoration: none; margin-top: 20px; background: #00ff88;">انضم للمهمة</a>
        </div>
    </div>
</div>

<script>
    let timer;
    let sLeft;
    let xp = 0;

    function start() {
        if(timer) clearInterval(timer);
        if(!sLeft) sLeft = document.getElementById('mins').value * 60;
        document.getElementById('circle').classList.add('timer-active');
        timer = setInterval(() => {
            if(sLeft <= 0) { 
                clearInterval(timer); 
                alert("تمت المهمة بنجاح!"); 
                document.getElementById('circle').classList.remove('timer-active');
            } else { 
                sLeft--; 
                let m = Math.floor(sLeft / 60);
                let s = sLeft % 60;
                document.getElementById('display').innerText = `${m}:${s < 10 ? '0' : ''}${s}`;
            }
        }, 1000);
    }

    function reset() {
        clearInterval(timer);
        sLeft = null;
        document.getElementById('circle').classList.remove('timer-active');
        document.getElementById('display').innerText = document.getElementById('mins').value + ":00";
    }

    function addT() {
        let val = document.getElementById('tIn').value;
        if(!val) return;
        let tasks = JSON.parse(localStorage.getItem('xpTasks')) || [];
        tasks.push(val);
        localStorage.setItem('xpTasks', JSON.stringify(tasks));
        document.getElementById('tIn').value = "";
        drawT();
    }

    function drawT() {
        let tasks = JSON.parse(localStorage.getItem('xpTasks')) || [];
        let list = document.getElementById('tList');
        list.innerHTML = "";
        tasks.forEach((t, i) => {
            list.innerHTML += `<div class="task-item"><span>${t}</span> <button class="btn-done" onclick="finish(${i})">إنجاز +10XP</button></div>`;
        });
    }

    function finish(i) {
        let tasks = JSON.parse(localStorage.getItem('xpTasks'));
        tasks.splice(i, 1);
        localStorage.setItem('xpTasks', JSON.stringify(tasks));
        xp += 10;
        checkRank();
        confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 }, colors: ['#00d2ff', '#9d50bb'] });
        drawT();
    }

    function checkRank() {
        let r = "محارب مبتدئ";
        if(xp >= 50) r = "مقاتل نخبة";
        if(xp >= 100) r = "أسطورة المذاكرة";
        document.getElementById('rankText').innerText = r;
    }

    window.onload = drawT;
</script>

</body>
</html>
